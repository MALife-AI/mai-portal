# ─── GPU Inference Stack ──────────────────────────────────────────
# 사용법:
#   1. 모델 다운로드: huggingface-cli download unsloth/Qwen3.5-4B-GGUF Qwen3.5-4B-Q8_0.gguf --local-dir ./models
#   2. 실행: docker compose -f docker-compose.inference.yml up -d
#   3. 확인: curl http://localhost:8801/health
#
# 다른 모델로 교체:
#   MODEL_PATH=/models/다른모델.gguf docker compose -f docker-compose.inference.yml up -d

services:
  inference:
    build:
      context: .
      dockerfile: Dockerfile.inference
      args:
        GPU: cuda  # 'off' for CPU-only
    ports:
      - "8801:8801"
    volumes:
      - ./models:/models
    environment:
      - MODEL_PATH=${MODEL_PATH:-/models/Qwen3.5-4B-Q8_0.gguf}
      - MODEL_ALIAS=${MODEL_ALIAS:-qwen3.5-4b}
      - CTX_SIZE=${CTX_SIZE:-16384}
      - GPU_LAYERS=${GPU_LAYERS:-999}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8801/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 모델 다운로드 헬퍼 (한 번만 실행)
  model-downloader:
    image: python:3.12-slim
    volumes:
      - ./models:/models
    command: >
      sh -c "pip install -q huggingface_hub &&
             huggingface-cli download unsloth/Qwen3.5-4B-GGUF Qwen3.5-4B-Q8_0.gguf --local-dir /models &&
             echo 'Download complete'"
    profiles: ["download"]  # docker compose --profile download run model-downloader
