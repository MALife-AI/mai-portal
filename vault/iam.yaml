departments:
  it:
    description: 시스템 개발 및 운영
    name: 보험개발팀
  underwriting:
    description: 보험 심사 및 언더라이팅
    name: 언더라이팅팀
roles:
  admin:
    allowed_paths:
      read:
      - /Public/**
      - /Shared/**
      - /Private/**
      write:
      - /Public/**
      - /Shared/**
      - /Private/**
  analyst:
    allowed_paths:
      read:
      - /Public/**
      - /Shared/**
      write:
      - /Public/reports/**
  underwriter:
    allowed_paths:
      read:
      - /Public/**
      - /Shared/**
      write:
      - /Public/underwriting/**
  viewer:
    allowed_paths:
      read:
      - /Public/**
      - /Shared/**
      write: []
users:
- department: it
  roles:
  - admin
  user_id: admin01
- department: underwriting
  roles:
  - underwriter
  user_id: uw001
- department: life_insurance
  roles:
  - analyst
  user_id: analyst01
- department: health_insurance
  roles:
  - viewer
  user_id: user01
